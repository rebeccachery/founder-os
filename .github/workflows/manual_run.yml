name: Manual Agent Run

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent to run (or 'all', 'daily', 'weekly')"
        required: true
        default: "funding_scout"
        type: choice
        options:
          - all
          - daily
          - weekly
          - funding_scout
          - executive_assistant
          - investors
          - crm
          - social
          - research
          - oss_discovery

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          SEED_DEMO_DATA: "false"
        run: |
          case "${{ github.event.inputs.agent }}" in
            all) python workflows/run_agent.py --all ;;
            daily) python workflows/run_agent.py --daily ;;
            weekly) python workflows/run_agent.py --weekly ;;
            *) python workflows/run_agent.py --agent "${{ github.event.inputs.agent }}" ;;
          esac
